name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run Codex Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, sys

          diff = open("pr_diff.txt").read()[:15000]

          if not diff.strip():
              print("No diff found — skipping review.")
              sys.exit(0)

          prompt = """Review this pull request diff. Return ONLY valid JSON in this exact format:
{
  "verdict": "APPROVE" or "REQUEST_CHANGES",
  "summary": "One sentence overview of what this PR does.",
  "issues": ["issue 1", "issue 2"],
  "risk_level": "LOW", "MEDIUM", or "HIGH"
}

Rules:
- verdict = REQUEST_CHANGES if there are any security issues, bugs, risky changes, or poor practices
- verdict = APPROVE only if the code is clean, safe, and well-structured
- issues = empty array [] if none found
- Be strict. Flag anything that could cause a production problem.

Diff:
""" + diff

          payload = {
              "model": "gpt-4o",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 800,
              "response_format": {"type": "json_object"}
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}"
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
              raw = result["choices"][0]["message"]["content"]
              review = json.loads(raw)
          except Exception as e:
              print(f"Codex call failed: {e}", file=sys.stderr)
              sys.exit(1)

          verdict   = review.get("verdict", "REQUEST_CHANGES")
          summary   = review.get("summary", "No summary provided.")
          issues    = review.get("issues", [])
          risk      = review.get("risk_level", "UNKNOWN")

          risk_emoji = {"LOW": "🟢", "MEDIUM": "🟡", "HIGH": "🔴"}.get(risk, "⚪")
          verdict_emoji = "✅" if verdict == "APPROVE" else "🚫"

          body_lines = [
              f"## {verdict_emoji} Codex PR Review — {verdict}",
              "",
              f"**Risk Level:** {risk_emoji} {risk}",
              f"**Summary:** {summary}",
          ]

          if issues:
              body_lines += ["", "**Issues found:**"]
              for i in issues:
                  body_lines.append(f"- {i}")
          else:
              body_lines += ["", "**No issues found.**"]

          if verdict == "REQUEST_CHANGES":
              body_lines += ["", "---", "_Resolve the issues above, then push a new commit to re-trigger this review._"]

          body = "\n".join(body_lines)

          # Submit formal GitHub review (APPROVE or REQUEST_CHANGES)
          review_payload = json.dumps({
              "commit_id": os.environ["HEAD_SHA"],
              "body": body,
              "event": verdict  # "APPROVE" or "REQUEST_CHANGES"
          }).encode()

          pr_number = os.environ["PR_NUMBER"]
          repo      = os.environ["REPO"]

          review_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews",
              data=review_payload,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json"
              }
          )

          with urllib.request.urlopen(review_req) as resp:
              print(f"Review submitted: {verdict} | Risk: {risk}")

          if verdict == "REQUEST_CHANGES":
              print("Failing workflow — issues must be resolved before merge.")
              sys.exit(1)
          EOF
