name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Write review script
        run: |
          cat > review.py << 'PYEOF'
          import os, json, urllib.request, sys

          diff = open("pr_diff.txt").read()[:15000]

          if not diff.strip():
              print("No diff found — skipping.")
              sys.exit(0)

          prompt = (
              "Review this pull request diff. Return ONLY valid JSON in this exact format:\n"
              "{\n"
              '  "verdict": "APPROVE" or "REQUEST_CHANGES",\n'
              '  "summary": "One sentence overview.",\n'
              '  "issues": ["issue 1", "issue 2"],\n'
              '  "risk_level": "LOW", "MEDIUM", or "HIGH"\n'
              "}\n\n"
              "Rules:\n"
              "- verdict = REQUEST_CHANGES if there are security issues, bugs, risky changes, or poor practices\n"
              "- verdict = APPROVE only if the code is clean, safe, and well-structured\n"
              "- issues = [] if none found\n"
              "- Be strict. Flag anything that could cause a production problem.\n\n"
              "Diff:\n" + diff
          )

          payload = {
              "model": "gpt-4o",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 800,
              "response_format": {"type": "json_object"}
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + os.environ["OPENAI_API_KEY"]
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
              review = json.loads(result["choices"][0]["message"]["content"])
          except Exception as e:
              print("Codex call failed: " + str(e), file=sys.stderr)
              sys.exit(1)

          verdict = review.get("verdict", "REQUEST_CHANGES")
          summary = review.get("summary", "No summary.")
          issues  = review.get("issues", [])
          risk    = review.get("risk_level", "UNKNOWN")

          verdict_label = "APPROVED" if verdict == "APPROVE" else "CHANGES REQUIRED"

          lines = [
              "## Codex PR Review: " + verdict_label,
              "",
              "**Risk Level:** " + risk,
              "**Summary:** " + summary,
          ]
          if issues:
              lines += ["", "**Issues found:**"] + ["- " + i for i in issues]
          else:
              lines += ["", "**No issues found.**"]
          if verdict == "REQUEST_CHANGES":
              lines += ["", "---", "_Fix the issues above and push a new commit to re-trigger this review._"]

          body = "\n".join(lines)

          comment_payload = json.dumps({"body": body}).encode()

          comment_req = urllib.request.Request(
              "https://api.github.com/repos/" + os.environ["REPO"] + "/issues/" + os.environ["PR_NUMBER"] + "/comments",
              data=comment_payload,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + os.environ["GH_TOKEN"],
                  "Accept": "application/vnd.github+json"
              }
          )

          with urllib.request.urlopen(comment_req) as resp:
              print("Review posted: " + verdict + " | Risk: " + risk)

          if verdict == "REQUEST_CHANGES":
              print("Issues found - failing status check. Merge is blocked.")
              sys.exit(1)
          PYEOF

      - name: Run Codex Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 review.py
